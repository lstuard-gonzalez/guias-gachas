<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genshin · Guía rápida de builds</title>
<style>
  :root {
    --bg: #0a1020; --bg2: #18223c; --card: #18223c; --card2: #1f2b48;
    --teal: #6fd3e6; --gold: #e8c877; --gold2: #d3bc8d; --crit: #ffc96b; --hp: #8fe3b8; --def: #9ad4ff;
    --energy: #c3b6ff; --elem: #a6e0cd; --heal: #a6f2b7;
    --text: #f2ecdc; --muted: #a9b4cc; --line: rgba(211,188,141,.28); --fixed: #7d88a8;
    --serif: Georgia, "Times New Roman", "Cambria", serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 1100px 520px at 78% -10%, rgba(232,200,119,.10), transparent 70%),
      radial-gradient(ellipse 820px 420px at 10% 8%, rgba(111,211,230,.08), transparent 70%),
      radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,248,220,.9), transparent),
      radial-gradient(1.5px 1.5px at 70% 18%, rgba(255,248,220,.7), transparent),
      radial-gradient(1px 1px at 40% 60%, rgba(232,200,119,.8), transparent),
      radial-gradient(1.5px 1.5px at 85% 48%, rgba(255,248,220,.6), transparent),
      radial-gradient(1px 1px at 55% 82%, rgba(232,200,119,.6), transparent),
      radial-gradient(1px 1px at 12% 78%, rgba(255,248,220,.5), transparent),
      linear-gradient(160deg, #10182e 0%, #0a1020 60%, #0a1020 100%);
    background-attachment: fixed;
    color: var(--text); font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh; padding: 24px 16px 60px;
  }
  .wrap { max-width: 1060px; margin: 0 auto; }
  header { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--line); position: relative; }
  header::after { content: ""; position: absolute; left: 0; bottom: -1px; width: 180px; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); box-shadow: 0 0 8px rgba(232,200,119,.5); }
  .logo { font-family: var(--serif); font-size: 1.9rem; font-weight: 700; letter-spacing: 1px; color: var(--gold); text-shadow: 0 0 18px rgba(232,200,119,.25); }
  .logo span { color: var(--teal); font-style: italic; }
  .logo small { display: block; font-family: "Segoe UI", system-ui, sans-serif; font-size: .72rem; font-weight: 600; color: var(--gold2); letter-spacing: 4px; font-style: normal; margin-top: 4px; }

  .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: linear-gradient(160deg, var(--card2), var(--card)); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; margin-bottom: 14px; box-shadow: inset 0 0 0 1px rgba(232,200,119,.06), 0 6px 24px rgba(0,0,0,.35); }
  .filters input, .filters select { background: rgba(10,16,32,.6); border: 1px solid var(--line); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: .9rem; outline: none; }
  .filters input { flex: 1; min-width: 160px; }
  .filters input:focus, .filters select:focus { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(232,200,119,.35); }
  .count { color: var(--gold2); font-size: .8rem; white-space: nowrap; }

  .chars { display: none; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; max-height: 48vh; overflow-y: auto; padding: 4px; scrollbar-width: thin; }
  .chars.open { display: flex; }
  .char-chip { background: linear-gradient(160deg, var(--card2), var(--card)); border: 1px solid var(--line); color: var(--text); padding: 7px 14px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: .88rem; transition: all .15s; display: inline-flex; align-items: center; gap: 7px; }
  .char-chip:hover { border-color: var(--gold); box-shadow: 0 0 12px rgba(232,200,119,.2); }
  .char-chip.active { background: linear-gradient(160deg, var(--gold), var(--gold2)); color: #14100a; border-color: var(--gold); box-shadow: 0 0 20px rgba(232,200,119,.4); }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .char-chip .rk { font-size: .7rem; opacity: .65; font-weight: 800; }
  .empty { color: var(--muted); padding: 20px; text-align: center; width: 100%; }

  .hero { background: linear-gradient(120deg, var(--card2) 55%, var(--card)); border: 1px solid var(--gold2); border-radius: 18px; padding: 22px 26px; margin-bottom: 8px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; position: relative; overflow: hidden; box-shadow: inset 0 0 40px rgba(232,200,119,.06), 0 0 30px rgba(232,200,119,.12), 0 10px 34px rgba(0,0,0,.4); }
  .hero::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse 400px 200px at 90% 10%, rgba(232,200,119,.12), transparent 70%); pointer-events: none; }
  .hero::after { content: attr(data-rank); position: absolute; right: 18px; top: -20px; font-size: 6rem; font-weight: 700; font-family: var(--serif); font-style: italic; color: rgba(232,200,119,.10); pointer-events: none; }
  .hero h1 { font-family: var(--serif); font-size: 2.1rem; font-weight: 700; letter-spacing: .5px; color: var(--gold); text-shadow: 0 0 20px rgba(232,200,119,.3); position: relative; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; position: relative; }
  .badge { padding: 5px 14px; border-radius: 8px; font-size: .8rem; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }
  .b-rank { background: linear-gradient(160deg, var(--gold), var(--gold2)); color: #14100a; box-shadow: 0 0 14px rgba(232,200,119,.35); }
  .b-elem { color: #06121a; }
  .b-arma { background: transparent; border: 1px solid var(--teal); color: var(--teal); }
  .b-ver  { background: rgba(10,16,32,.5); border: 1px solid var(--line); color: var(--gold2); }

  .ficha { background: linear-gradient(160deg, var(--card2), var(--card)); border: 1px solid var(--line); border-radius: 16px; padding: 16px 20px; margin-top: 14px; display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; box-shadow: 0 6px 24px rgba(0,0,0,.3); }
  .ficha .art { width: 140px; height: 180px; border-radius: 12px; flex-shrink: 0; position: relative; overflow: hidden; background: var(--bg2); display: flex; align-items: center; justify-content: center; border: 1px solid var(--line); }
  .ficha .art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .ficha .art .ph { font-size: 3rem; font-weight: 900; font-style: italic; color: var(--fixed); }
  .ficha .fmeta { flex: 1; min-width: 240px; }
  .ficha .fname { font-size: 1.1rem; font-weight: 800; }
  .ficha .fname small { display: block; font-size: .78rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .ficha .frow { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .ficha .fchip { font-size: .76rem; font-weight: 700; padding: 4px 11px; border-radius: 7px; background: var(--bg2); border: 1px solid var(--line); color: var(--muted); }
  .ficha .fdesc { font-size: .9rem; line-height: 1.6; color: var(--text); }
  .ficha .fdesc.pend { color: var(--muted); font-style: italic; }

  h2 { font-family: var(--serif); font-size: 1.15rem; text-transform: none; letter-spacing: 1px; color: var(--gold); margin: 26px 0 12px; font-style: italic; display: flex; align-items: center; gap: 12px; }
  h2::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold2), transparent); }

  .table-scroll { overflow-x: auto; border-radius: 14px; border: 1px solid var(--line); box-shadow: 0 6px 24px rgba(0,0,0,.3); }
  table { width: 100%; border-collapse: collapse; background: var(--card); min-width: 640px; }
  thead th { background: linear-gradient(160deg, var(--card2), var(--bg2)); color: var(--gold2); font-size: .75rem; text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 16px; text-align: left; border-bottom: 2px solid var(--gold); }
  tbody td { padding: 13px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(232,200,119,.05); }
  .slot-num { display: inline-flex; align-items: center; justify-content: center; min-width: 128px; height: 34px; padding: 0 12px; border-radius: 9px; font-weight: 800; font-size: .8rem; background: linear-gradient(160deg, var(--gold), var(--gold2)); color: #14100a; box-shadow: 0 0 12px rgba(232,200,119,.25); gap: 6px; }
  .slot-num.fixed { background: rgba(10,16,32,.5); color: var(--muted); border: 1px solid var(--line); box-shadow: none; }
  .main-stat { font-weight: 800; font-size: 1rem; }
  .alt { display: block; font-size: .8rem; color: var(--muted); font-weight: 500; margin-top: 3px; }
  .fija { display: inline-block; margin-left: 6px; font-size: .68rem; font-weight: 800; color: var(--fixed); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; text-transform: uppercase; letter-spacing: .5px; vertical-align: middle; }
  .tag { display: inline-block; padding: 3px 10px; margin: 2px 3px 2px 0; border-radius: 6px; font-size: .78rem; font-weight: 700; }
  .t-crit { background: rgba(255,176,32,.15); color: var(--crit); border: 1px solid rgba(255,176,32,.4); }
  .t-atk  { background: rgba(245,208,107,.12); color: var(--gold); border: 1px solid rgba(245,208,107,.35); }
  .t-hp   { background: rgba(110,231,160,.12); color: var(--hp); border: 1px solid rgba(110,231,160,.4); }
  .t-def  { background: rgba(127,208,255,.12); color: var(--def); border: 1px solid rgba(127,208,255,.4); }
  .t-energy{ background: rgba(182,166,255,.14); color: var(--energy); border: 1px solid rgba(182,166,255,.4); }
  .t-elem { background: rgba(143,211,192,.12); color: var(--elem); border: 1px solid rgba(143,211,192,.4); }
  .t-heal { background: rgba(143,239,159,.12); color: var(--heal); border: 1px solid rgba(143,239,159,.4); }
  .t-gen  { background: rgba(234,240,246,.08); color: var(--text); border: 1px solid var(--line); }
  .disc-badge { display: inline-block; padding: 5px 11px; border-radius: 8px; font-size: .82rem; font-weight: 700; background: rgba(232,200,119,.12); color: var(--gold); border: 1px solid rgba(232,200,119,.4); white-space: nowrap; }
  .set2 { display: block; font-size: .74rem; color: var(--muted); margin-top: 4px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 16px; }
  .card { background: linear-gradient(160deg, var(--card2), var(--card)); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; box-shadow: 0 6px 20px rgba(0,0,0,.28); }
  .card h3 { font-family: var(--serif); font-style: italic; font-size: .92rem; text-transform: none; letter-spacing: .5px; color: var(--gold2); margin-bottom: 12px; }
  .card ol, .card ul { list-style: none; }
  .card li { padding: 8px 0; border-bottom: 1px dashed var(--line); display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: .93rem; }
  .card li:last-child { border-bottom: none; }
  .card li b { font-weight: 800; }
  .best { color: var(--gold); text-shadow: 0 0 10px rgba(232,200,119,.3); }
  .en { color: var(--fixed); font-size: .78rem; font-style: italic; text-align: right; white-space: nowrap; }
  .note { margin-top: 18px; background: rgba(232,200,119,.08); border: 1px solid rgba(232,200,119,.32); border-radius: 12px; padding: 14px 18px; font-size: .92rem; line-height: 1.5; box-shadow: inset 0 0 20px rgba(232,200,119,.05); }
  .note b { color: var(--gold); }
  .parcial { display: inline-block; margin-left: 8px; font-size: .7rem; font-weight: 800; color: var(--crit); border: 1px solid var(--crit); border-radius: 6px; padding: 2px 8px; text-transform: uppercase; letter-spacing: .5px; vertical-align: middle; }
  footer { margin-top: 34px; text-align: center; color: var(--gold2); font-size: .78rem; padding-top: 18px; border-top: 1px solid var(--line); font-family: var(--serif); font-style: italic; letter-spacing: .5px; }
</style>
<style>
.site-nav{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:9px 12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.13);border-radius:12px;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;backdrop-filter:blur(4px);}
.site-nav a{text-decoration:none;color:#d3dae8;font-weight:700;font-size:.82rem;padding:5px 11px;border-radius:8px;transition:background .15s,color .15s;white-space:nowrap;}
.site-nav a:hover{background:rgba(255,255,255,.11);color:#fff;}
.site-nav .nav-home{color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);}
.site-nav .nav-sep{width:1px;height:20px;background:rgba(255,255,255,.16);flex:0 0 auto;}
.site-nav .nav-games{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.site-nav .current{background:rgba(255,255,255,.15);color:#fff;pointer-events:none;}
@media(max-width:560px){.site-nav .nav-lbl{display:none;}}
</style>
<style>
.game-hero{position:relative;height:172px;border-radius:16px;overflow:hidden;margin-bottom:18px;background:#0a0d16 var(--gh-art) center 28%/cover no-repeat;border:1px solid rgba(255,255,255,.10);}
.game-hero .gh-veil{position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,8,14,.92),rgba(6,8,14,.5) 58%,rgba(6,8,14,.18));}
.game-hero .gh-in{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;gap:9px;padding:0 28px;}
.game-hero .gh-logo{height:58px;width:auto;max-width:290px;object-fit:contain;filter:drop-shadow(0 3px 12px rgba(0,0,0,.65));}
.game-hero .gh-word{font-size:1.85rem;font-weight:900;font-style:italic;color:#fff;letter-spacing:.5px;text-shadow:0 3px 16px rgba(0,0,0,.75);}
.game-hero .gh-tag{font-size:.76rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#e8c877;}
@media(max-width:560px){.game-hero{height:132px;} .game-hero .gh-logo{height:44px;} .game-hero .gh-word{font-size:1.3rem;}}
</style>
</head>
<body>
<div class="wrap">
<nav class="site-nav">
  <a class="nav-home" href="../">◄ <span class="nav-lbl">Portal</span></a>
  <span class="nav-sep"></span>
  <div class="nav-games"><a href="../genshin/" class="current">Genshin</a><a href="../hsr/">HSR</a><a href="../zzz/">ZZZ</a><a href="../wuwa/">WuWa</a><a href="../nte/">NTE</a></div>
</nav>
<div class="game-hero" style="--gh-art:url(&apos;https://static.wikia.nocookie.net/gensin-impact/images/0/06/Character_Aether_Lumine_Paimon_Genshin_FES_2021.png/revision/latest?cb=20221207020558&apos;)">
  <div class="gh-veil"></div>
  <div class="gh-in">
    <img class="gh-logo" src="https://static.wikia.nocookie.net/gensin-impact/images/2/2a/Genshin-Impact-Logo.png/revision/latest?cb=20230708061611" alt="Genshin Impact" onerror="this.style.display=&apos;none&apos;;this.nextElementSibling.style.display=&apos;block&apos;"><span class="gh-word" style="display:none">Genshin Impact</span>
    <span class="gh-tag">Guía de builds · v6.7</span>
  </div>
</div>

  <header>
    <div class="logo">Genshin <span>· Deseos & Builds</span><small>✦ GENSHIN IMPACT · GUÍA DE BUILDS DE PERSONAJES ✦</small></div>
  </header>

  <div class="filters">
    <input type="text" id="fSearch" placeholder="🔍 Buscar / ver personajes (toca aquí)..." oninput="applyFilters()">
    <select id="fRareza" onchange="applyFilters()"><option value="">Rareza: todas</option><option value="5">5★</option><option value="4">4★</option></select>
    <select id="fElem" onchange="applyFilters()"><option value="">Elemento: todos</option></select>
    <select id="fArma" onchange="applyFilters()"><option value="">Arma: todas</option></select>
    <span class="count" id="fCount"></span>
  </div>

  <nav class="chars" id="charNav"></nav>
  <div id="content"></div>

  <footer>✦ Consulta rápida local · Genshin Impact · Nombres en español del juego ✦</footer>
</div>

<script src="data.js"></script>
<script>
const ELEM_COLORS = {
  "Pyro": "#ff7a45", "Hydro": "#4cc2f1", "Electro": "#c77dff",
  "Cryo": "#8fe3ff", "Anemo": "#5cd6a9", "Geo": "#f5b544", "Dendro": "#a5d84a",
};
const elemColor = e => ELEM_COLORS[e] || "#cccccc";

function statClass(s) {
  const t = s.toLowerCase();
  if (t.includes("crít") || t.includes("crit")) return "t-crit";
  if (t.includes("curaci") || t.includes("sanaci")) return "t-heal";
  if (t.includes("energ") || t.includes("recarga")) return "t-energy";
  if (t.includes("bonif") || t.includes("daño de") || t.includes("dano de") || t.includes("maestr")) return "t-elem";
  if (t.includes("pv") || t.includes("vida")) return "t-hp";
  if (t.includes("def")) return "t-def";
  if (t.includes("atq") || t.includes("ataque")) return "t-atk";
  return "t-gen";
}

let activeId = null;
function fillFilterOptions() {
  const el = [...new Set(CHARACTERS.map(c => c.elemento))].sort();
  const ar = [...new Set(CHARACTERS.map(c => c.arma))].sort();
  document.getElementById("fElem").innerHTML = '<option value="">Elemento: todos</option>' + el.map(e => `<option>${e}</option>`).join("");
  document.getElementById("fArma").innerHTML = '<option value="">Arma: todas</option>' + ar.map(a => `<option>${a}</option>`).join("");
}
function filtered() {
  const q = document.getElementById("fSearch").value.trim().toLowerCase();
  const r = document.getElementById("fRareza").value, e = document.getElementById("fElem").value, a = document.getElementById("fArma").value;
  return CHARACTERS.filter(c => (!q || c.nombre.toLowerCase().includes(q)) && (!r || String(c.rareza) === r) && (!e || c.elemento === e) && (!a || c.arma === a));
}
function applyFilters() {
  const list = filtered();
  document.getElementById("fCount").textContent = `${list.length} personaje${list.length !== 1 ? "s" : ""}`;
  const nav = document.getElementById("charNav");
  if (!list.length) { nav.innerHTML = `<div class="empty">Sin resultados.</div>`; document.getElementById("content").innerHTML = ""; return; }
  if (!list.some(c => c.id === activeId)) show(list[0].id, list); else renderNav(list);
}
function renderNav(list) {
  document.getElementById("charNav").innerHTML = list.map(c => `
    <button class="char-chip ${c.id === activeId ? "active" : ""}" onclick="show('${c.id}')">
      <span class="dot" style="background:${elemColor(c.elemento)}"></span>${c.nombre} <span class="rk">${c.rareza}★</span>
    </button>`).join("");
}

function show(id, list) {
  const c = CHARACTERS.find(x => x.id === id);
  if (!c) return;
  activeId = id; renderNav(list || filtered());

  const subs = (c.substats || []).map(s => `<span class="tag ${statClass(s)}">${s}</span>`).join("");
  const setP = c.setPrincipal || (c.sets && c.sets[0] && c.sets[0].es) || "—";
  const setCell = `<span class="disc-badge">🏛️ ${setP}</span>`;
  const arena = c.arena || {}, caliz = c.caliz || {}, tiara = c.tiara || {};
  const rows = [
    { lbl: "🌸 Flor de la Vida", fixed: true, r: { principal: "PV" } },
    { lbl: "🪶 Pluma de la Muerte", fixed: true, r: { principal: "ATQ" } },
    { lbl: "⏳ Arena del Tiempo", r: arena },
    { lbl: "🍷 Cáliz de Eón", r: caliz },
    { lbl: "👑 Tiara de la Razón", r: tiara },
  ].map(row => `
    <tr>
      <td><span class="slot-num ${row.fixed ? "fixed" : ""}">${row.lbl}</span></td>
      <td><span class="main-stat">${row.r.principal || "—"}</span>
        ${row.fixed ? `<span class="fija">fija</span>` : ""}
        ${row.r.alt ? `<span class="alt">${row.r.alt}</span>` : ""}</td>
      <td>${setCell}</td>
      <td>${subs}</td>
    </tr>`).join("");

  const lista = arr => (arr || []).map((i, idx) => {
    const best = i.best || idx === 0;
    return `<li><span><b class="${best ? "best" : ""}">${best ? "★ " : ""}${i.es || i.nombre}</b>
      ${i.nota ? `<span class="alt">${i.nota}</span>` : ""}${i.agentes ? `<span class="alt">${i.agentes}</span>` : ""}</span>
      ${i.en && i.en !== (i.es || "") ? `<span class="en">${i.en}</span>` : ""}</li>`;
  }).join("");

  const f = c.ficha || {};
  const artInner = f.img ? `<img src="${f.img}" alt="${c.nombre}" loading="lazy" onerror="this.remove()"><span class="ph">${c.nombre[0]}</span>` : `<span class="ph">${c.nombre[0]}</span>`;
  const fichaHtml = `
    <div class="ficha">
      <div class="art" style="background:linear-gradient(160deg, ${elemColor(c.elemento)}33, var(--bg2))">${artInner}</div>
      <div class="fmeta">
        <div class="fname">${f.nombreCompleto || c.nombre}${f.nombreCompleto && f.nombreCompleto !== c.nombre ? `<small>En el juego: ${c.nombre}</small>` : ""}</div>
        <div class="frow">
          <span class="fchip" style="border-color:${elemColor(c.elemento)};color:${elemColor(c.elemento)}">${c.elemento}</span>
          <span class="fchip">${c.arma}</span>
          <span class="fchip">${c.rareza}★</span>
          ${f.faccion ? `<span class="fchip">🏳️ ${f.faccion}</span>` : ""}
        </div>
        <div class="fdesc ${f.desc ? "" : "pend"}">${f.desc || "Ficha del personaje en preparación…"}</div>
      </div>
    </div>`;

  document.getElementById("content").innerHTML = `
    <div class="hero" data-rank="${c.rareza}★">
      <h1>${c.nombre}${c.estado === 'parcial' ? '<span class="parcial">datos parciales</span>' : ''}</h1>
      <div class="badges">
        <span class="badge b-rank">${c.rareza}★</span>
        <span class="badge b-elem" style="background:${elemColor(c.elemento)}">${c.elemento}</span>
        <span class="badge b-arma">${c.arma}</span>
        <span class="badge b-ver">v${c.version}</span>
      </div>
    </div>
    ${fichaHtml}

    <h2>Artefactos · estadística principal y set recomendado</h2>
    <div class="table-scroll"><table>
      <thead><tr><th>Artefacto</th><th>Estadística principal</th><th>Set recomendado</th><th>Subestadísticas (prioridad)</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>

    ${c.consejo ? `<div class="note">💡 ${c.consejo}</div>` : ""}

    <h2>Equipamiento y equipos</h2>
    <div class="grid">
      <div class="card"><h3>⚔️ Arma (mejor → alternativas)</h3><ol>${lista(c.armas)}</ol></div>
      <div class="card"><h3>🏛️ Sets de artefactos</h3><ol>${lista(c.sets)}</ol></div>
      <div class="card"><h3>👥 Equipos recomendados</h3><ol>${lista(c.equipos)}</ol></div>
    </div>
  `;
}

function setupChipsToggle() {
  const searchEl = document.getElementById("fSearch"), navEl = document.getElementById("charNav");
  let pinned = false;
  const setOpen = o => navEl.classList.toggle("open", o);
  searchEl.addEventListener("focus", () => setOpen(true));
  searchEl.addEventListener("blur", () => { if (!pinned) setOpen(false); });
  navEl.addEventListener("mouseenter", () => pinned = true);
  navEl.addEventListener("mouseleave", () => { pinned = false; if (document.activeElement !== searchEl) setOpen(false); });
  navEl.addEventListener("click", e => { if (e.target.closest(".char-chip")) { pinned = false; searchEl.blur(); setOpen(false); } });
}

CHARACTERS.sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
fillFilterOptions();
applyFilters();
setupChipsToggle();
</script>
</body>
</html>
