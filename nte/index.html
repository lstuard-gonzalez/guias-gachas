<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTE · Guía rápida de builds</title>
<style>
  :root {
    --bg: #101014;
    --bg2: #17171d;
    --card: #1d1d25;
    --card2: #23232d;
    --lime: #d4ff00;
    --orange: #ff7a1a;
    --crit: #ffb020;
    --def: #4fe3c1;
    --elem: #c77dff;
    --imp: #4dc3ff;
    --text: #e8e8ec;
    --muted: #9a9aa8;
    --line: #32323e;
    --fixed: #5a5a68;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 900px 400px at 80% -10%, rgba(212,255,0,.07), transparent),
      radial-gradient(ellipse 700px 350px at 10% 110%, rgba(255,122,26,.06), transparent);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 1040px; margin: 0 auto; }

  header { margin-bottom: 18px; }
  .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; font-style: italic; }
  .logo span { color: var(--lime); }
  .logo small { display: block; font-size: .72rem; font-weight: 600; color: var(--muted); letter-spacing: 3px; font-style: normal; }

  .filters {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 14px;
  }
  .filters input, .filters select {
    background: var(--bg2); border: 1px solid var(--line); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: .9rem; outline: none;
  }
  .filters input { flex: 1; min-width: 160px; }
  .filters input:focus, .filters select:focus { border-color: var(--lime); }
  .count { color: var(--muted); font-size: .8rem; white-space: nowrap; }

  .chars { display: none; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; max-height: 48vh; overflow-y: auto; padding: 4px; scrollbar-width: thin; }
  .chars.open { display: flex; }
  .char-chip {
    background: var(--card); border: 1px solid var(--line); color: var(--text);
    padding: 7px 14px; border-radius: 999px; cursor: pointer;
    font-weight: 700; font-size: .88rem; transition: all .15s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .char-chip:hover { border-color: var(--lime); }
  .char-chip.active { background: var(--lime); color: #101014; border-color: var(--lime); box-shadow: 0 0 18px rgba(212,255,0,.35); }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .char-chip .rk { font-size: .7rem; opacity: .65; font-weight: 800; }
  .empty { color: var(--muted); padding: 20px; text-align: center; width: 100%; }

  .hero {
    background: linear-gradient(120deg, var(--card) 60%, var(--card2));
    border: 1px solid var(--line); border-radius: 18px;
    padding: 22px 26px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: attr(data-rank);
    position: absolute; right: 14px; top: -26px;
    font-size: 7rem; font-weight: 900; font-style: italic;
    color: rgba(212,255,0,.08); pointer-events: none;
  }
  .hero h1 { font-size: 2rem; font-weight: 900; font-style: italic; letter-spacing: .5px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { padding: 5px 14px; border-radius: 8px; font-size: .8rem; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }
  .b-rank { background: var(--orange); color: #14100a; }
  .b-elem { color: #14100a; }
  .b-rol  { background: transparent; border: 1px solid var(--lime); color: var(--lime); }
  .b-ver  { background: var(--card2); border: 1px solid var(--line); color: var(--muted); }

  /* ---------- Ficha del personaje ---------- */
  .ficha { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px 20px; margin-top: 14px; display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .ficha .art { width: 140px; height: 180px; border-radius: 12px; flex-shrink: 0; position: relative; overflow: hidden; background: var(--bg2); display: flex; align-items: center; justify-content: center; border: 1px solid var(--line); }
  .ficha .art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .ficha .art .ph { font-size: 3rem; font-weight: 900; font-style: italic; color: var(--fixed); }
  .ficha .fmeta { flex: 1; min-width: 240px; }
  .ficha .fname { font-size: 1.1rem; font-weight: 800; }
  .ficha .fname small { display: block; font-size: .78rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .ficha .frow { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .ficha .fchip { font-size: .76rem; font-weight: 700; padding: 4px 11px; border-radius: 7px; background: var(--bg2); border: 1px solid var(--line); color: var(--muted); }
  .ficha .fdesc { font-size: .9rem; line-height: 1.6; color: var(--text); }
  .ficha .fdesc.pend { color: var(--muted); font-style: italic; }

  h2 {
    font-size: 1.05rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--lime); margin: 26px 0 12px; font-style: italic;
    display: flex; align-items: center; gap: 10px;
  }
  h2::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  .table-scroll { overflow-x: auto; border-radius: 14px; border: 1px solid var(--line); }
  table { width: 100%; border-collapse: collapse; background: var(--card); min-width: 520px; }
  thead th {
    background: var(--bg2); color: var(--muted); font-size: .75rem;
    text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 16px; text-align: left;
    border-bottom: 2px solid var(--lime);
  }
  tbody td { padding: 13px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(212,255,0,.04); }
  .slot-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 9px;
    font-weight: 900; font-size: 1rem; font-style: italic;
    background: var(--bg2); color: var(--muted); border: 1px solid var(--line);
  }
  .slot-num.top { background: var(--lime); color: #101014; box-shadow: 0 0 12px rgba(212,255,0,.3); }
  .tag { display: inline-block; padding: 4px 12px; border-radius: 7px; font-size: .9rem; font-weight: 700; }
  .t-crit { background: rgba(255,176,32,.15); color: var(--crit); border: 1px solid rgba(255,176,32,.4); }
  .t-atk  { background: rgba(212,255,0,.10); color: var(--lime); border: 1px solid rgba(212,255,0,.35); }
  .t-def  { background: rgba(79,227,193,.12); color: var(--def); border: 1px solid rgba(79,227,193,.4); }
  .t-elem { background: rgba(199,125,255,.12); color: var(--elem); border: 1px solid rgba(199,125,255,.4); }
  .t-pen  { background: rgba(255,122,26,.12); color: var(--orange); border: 1px solid rgba(255,122,26,.4); }
  .t-gen  { background: rgba(232,232,236,.08); color: var(--text); border: 1px solid var(--line); }
  .rel { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .rel.max { color: var(--lime); }
  .rel.alta { color: var(--crit); }
  .rel.media { color: var(--muted); }
  .disc-badge { display: inline-block; padding: 5px 11px; border-radius: 8px; font-size: .82rem; font-weight: 700; background: rgba(199,125,255,.12); color: var(--elem); border: 1px solid rgba(199,125,255,.4); white-space: nowrap; }
  .reco-strip { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .reco-strip .rlabel { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; }
  .card h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; }
  .card ol, .card ul { list-style: none; }
  .card li {
    padding: 8px 0; border-bottom: 1px dashed var(--line);
    display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: .93rem;
  }
  .card li:last-child { border-bottom: none; }
  .card li b { font-weight: 800; }
  .best { color: var(--lime); }
  .alt { display: block; font-size: .8rem; color: var(--muted); font-weight: 500; margin-top: 3px; }
  .en { color: var(--fixed); font-size: .78rem; font-style: italic; text-align: right; white-space: nowrap; }
  .mod-text { font-size: .9rem; line-height: 1.55; color: var(--text); }
  .note { margin-top: 18px; background: rgba(255,122,26,.07); border: 1px solid rgba(255,122,26,.35); border-radius: 12px; padding: 14px 18px; font-size: .92rem; line-height: 1.5; }
  .note b { color: var(--orange); }
  .parcial { display: inline-block; margin-left: 8px; font-size: .7rem; font-weight: 800; color: var(--crit); border: 1px solid var(--crit); border-radius: 6px; padding: 2px 8px; text-transform: uppercase; letter-spacing: .5px; vertical-align: middle; }
  footer { margin-top: 34px; text-align: center; color: var(--fixed); font-size: .78rem; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">NTE <span>Guía rápida</span><small>NEVERNESS TO EVERNESS · BUILDS DE ESPERS</small></div>
  </header>

  <div class="filters">
    <input type="text" id="fSearch" placeholder="🔍 Buscar / ver Espers (toca aquí)..." oninput="applyFilters()">
    <select id="fRango" onchange="applyFilters()"><option value="">Rango: todos</option><option value="S">Rango S</option><option value="A">Rango A</option></select>
    <select id="fElem" onchange="applyFilters()"><option value="">Elemento: todos</option></select>
    <select id="fRol" onchange="applyFilters()"><option value="">Rol: todos</option></select>
    <span class="count" id="fCount"></span>
  </div>

  <nav class="chars" id="charNav"></nav>
  <div id="content"></div>

  <footer>Consulta rápida local · Neverness to Everness · Nombres oficiales en español del juego</footer>
</div>

<script src="fichas.js"></script>
<script src="data.js"></script>
<script>
const ELEM_COLORS = {
  "Lakshana": "#ffcf5e", "Chaos": "#c77dff", "Cosmos": "#4fd0ff",
  "Anima": "#57e6a2", "Incantation": "#ff8a4c", "Psyche": "#ff6ac1",
};
const elemColor = e => ELEM_COLORS[e] || "#cccccc";

function statClass(s) {
  const t = s.toLowerCase();
  if (t.includes("crí") || t.includes("crit")) return "t-crit";
  if (t.includes("penetra")) return "t-pen";
  if (t.includes("ps") || t.includes("def") || t.includes("curaci") || t.includes("energía")) return "t-def";
  if (t.includes("daño de") || t.includes("universal")) return "t-elem";
  if (t.includes("atq") || t.includes("ataque")) return "t-atk";
  return "t-gen";
}

let activeId = null;

function fillFilterOptions() {
  const elems = [...new Set(CHARACTERS.map(c => c.elemento))].sort();
  const roles = [...new Set(CHARACTERS.map(c => c.rol))].sort();
  document.getElementById("fElem").innerHTML = '<option value="">Elemento: todos</option>' + elems.map(e => `<option>${e}</option>`).join("");
  document.getElementById("fRol").innerHTML = '<option value="">Rol: todos</option>' + roles.map(r => `<option>${r}</option>`).join("");
}
function filtered() {
  const q = document.getElementById("fSearch").value.trim().toLowerCase();
  const r = document.getElementById("fRango").value, e = document.getElementById("fElem").value, rl = document.getElementById("fRol").value;
  return CHARACTERS.filter(c => (!q || c.nombre.toLowerCase().includes(q)) && (!r || c.rango === r) && (!e || c.elemento === e) && (!rl || c.rol === rl));
}
function applyFilters() {
  const list = filtered();
  document.getElementById("fCount").textContent = `${list.length} Esper${list.length !== 1 ? "s" : ""}`;
  const nav = document.getElementById("charNav");
  if (!list.length) { nav.innerHTML = `<div class="empty">Sin resultados.</div>`; document.getElementById("content").innerHTML = ""; return; }
  if (!list.some(c => c.id === activeId)) show(list[0].id, list); else renderNav(list);
}
function renderNav(list) {
  document.getElementById("charNav").innerHTML = list.map(c => `
    <button class="char-chip ${c.id === activeId ? "active" : ""}" onclick="show('${c.id}')">
      <span class="dot" style="background:${elemColor(c.elemento)}"></span>${c.nombre} <span class="rk">${c.rango}</span>
    </button>`).join("");
}

function show(id, list) {
  const c = CHARACTERS.find(x => x.id === id);
  if (!c) return;
  activeId = id; renderNav(list || filtered());
  const ROMAN = ["I", "II", "III", "IV", "V", "VI", "VII"];

  const filas = (c.statPriority || []).map((s, i) => {
    const rel = i === 0 ? '<span class="rel max">Máxima</span>' : i <= 2 ? '<span class="rel alta">Alta</span>' : '<span class="rel media">Media</span>';
    return `<tr>
      <td><span class="slot-num ${i===0?'top':''}">${ROMAN[i] || (i+1)}</span></td>
      <td><span class="tag ${statClass(s)}">${s}</span></td>
      <td>${rel}</td>
    </tr>`;
  }).join("");

  const lista = arr => (arr || []).map((i, idx) => {
    const best = i.best || idx === 0;
    return `<li>
      <span><b class="${best ? "best" : ""}">${best ? "★ " : ""}${i.es || i.nombre}</b>
      ${i.nota ? `<span class="alt">${i.nota}</span>` : ""}
      ${i.agentes ? `<span class="alt">${i.agentes}</span>` : ""}</span>
      ${i.en && i.en !== (i.es || "") ? `<span class="en">${i.en}</span>` : ""}
    </li>`;
  }).join("");

  const fi = (typeof FICHAS !== "undefined" && FICHAS[c.id]) || {};
  const artInner = fi.img
    ? `<img src="${fi.img}" alt="${c.nombre}" loading="lazy" onerror="this.remove()"><span class="ph">${c.nombre[0]}</span>`
    : `<span class="ph">${c.nombre[0]}</span>`;
  const fichaHtml = `
    <div class="ficha">
      <div class="art" style="background:linear-gradient(160deg, ${elemColor(c.elemento)}33, var(--bg2))">${artInner}</div>
      <div class="fmeta">
        <div class="fname">${fi.nombreCompleto || c.nombre}${fi.nombreCompleto && fi.nombreCompleto !== c.nombre ? `<small>En el juego: ${c.nombre}</small>` : ""}</div>
        <div class="frow">
          <span class="fchip" style="border-color:${elemColor(c.elemento)};color:${elemColor(c.elemento)}">${c.elemento}</span>
          <span class="fchip">${c.rol}</span>
          <span class="fchip">Rango ${c.rango}</span>
          ${fi.faccion ? `<span class="fchip">🏳️ ${fi.faccion}</span>` : ""}
        </div>
        <div class="fdesc ${fi.desc ? "" : "pend"}">${fi.desc || "Ficha del personaje en preparación…"}</div>
      </div>
    </div>`;

  document.getElementById("content").innerHTML = `
    <div class="hero" data-rank="${c.rango}">
      <h1>${c.nombre}${c.estado==='parcial'?'<span class="parcial">datos parciales</span>':''}</h1>
      <div class="badges">
        <span class="badge b-rank">Rango ${c.rango}</span>
        <span class="badge b-elem" style="background:${elemColor(c.elemento)}">${c.elemento}</span>
        <span class="badge b-rol">${c.rol}</span>
        <span class="badge b-ver">v${c.version}</span>
      </div>
    </div>

    ${fichaHtml}

    <h2>Prioridad de estadísticas</h2>
    <div class="table-scroll">
      <table>
        <thead><tr><th>Orden</th><th>Estadística clave</th><th>Relevancia</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
    <div class="reco-strip">
      <span class="rlabel">Óptimo:</span>
      ${c.discos && c.discos[0] ? `<span class="disc-badge">💿 ${c.discos[0].es}</span>` : ""}
      ${c.cartuchos && c.cartuchos[0] ? `<span class="disc-badge">🧩 ${c.cartuchos[0].es}${/×\d/.test(c.cartuchos[0].es) ? "" : " ×4"}</span>` : ""}
    </div>

    ${c.consejo ? `<div class="note">💡 ${c.consejo}</div>` : ""}

    <h2>Equipamiento y equipos</h2>
    <div class="grid">
      <div class="card"><h3>💿 Disco (arma)</h3><ol>${lista(c.discos)}</ol></div>
      <div class="card"><h3>🧩 Cartucho · Épico (2) / Legendario (4)</h3><ol>${lista(c.cartuchos)}</ol></div>
      <div class="card"><h3>🎮 Módulos · Consola</h3><div class="mod-text">${c.consola || "—"}</div></div>
      <div class="card"><h3>👥 Equipos recomendados</h3><ol>${lista(c.equipos)}</ol></div>
    </div>
  `;
}

function setupChipsToggle() {
  const searchEl = document.getElementById("fSearch");
  const navEl = document.getElementById("charNav");
  let pinned = false;
  const setOpen = o => navEl.classList.toggle("open", o);
  searchEl.addEventListener("focus", () => setOpen(true));
  searchEl.addEventListener("blur", () => { if (!pinned) setOpen(false); });
  navEl.addEventListener("mouseenter", () => pinned = true);
  navEl.addEventListener("mouseleave", () => { pinned = false; if (document.activeElement !== searchEl) setOpen(false); });
  navEl.addEventListener("click", e => { if (e.target.closest(".char-chip")) { pinned = false; searchEl.blur(); setOpen(false); } });
}

CHARACTERS.sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
fillFilterOptions();
applyFilters();
setupChipsToggle();
</script>
</body>
</html>
