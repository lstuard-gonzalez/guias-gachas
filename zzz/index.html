<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZZZ · Guía rápida de discos</title>
<style>
  :root {
    --bg: #0c0c0c;
    --bg2: #141414;
    --card: #1a1a1a;
    --card2: #202020;
    --lime: #ffe633;        /* AMARILLO señal (acento principal ZZZ) */
    --yellow2: #fff230;
    --cyan: #38f0e0;        /* CIAN eléctrico */
    --magenta: #ff2fb0;     /* magenta ocasional */
    --orange: #ff7a1a;
    --crit: #ffc94d;
    --anom: #c77dff;
    --imp: #38f0e0;
    --def: #4fe3c1;
    --text: #f2f2f2;
    --muted: #9a9aa2;
    --line: #333338;
    --fixed: #6a6a72;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    /* rayas de peligro diagonales muy tenues + ruido/estática + resplandores */
    background-image:
      radial-gradient(ellipse 900px 420px at 82% -12%, rgba(255,230,51,.10), transparent),
      radial-gradient(ellipse 720px 360px at 8% 112%, rgba(56,240,224,.07), transparent),
      repeating-linear-gradient(45deg, rgba(255,230,51,.035) 0 22px, transparent 22px 44px);
    background-attachment: fixed;
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  /* velo de estática TV muy sutil sobre el fondo */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: .05; mix-blend-mode: screen;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.4) 0 1px, transparent 1px 3px);
  }
  .wrap { max-width: 1040px; margin: 0 auto; position: relative; z-index: 1; }

  /* ---------- Header ---------- */
  header { margin-bottom: 18px; }
  .logo {
    position: relative;
    display: inline-block;
    background: var(--lime);
    color: #0c0c0c;
    font-family: "Arial Black", "Impact", system-ui, sans-serif;
    font-size: 1.9rem; font-weight: 900; letter-spacing: 1px; line-height: 1;
    text-transform: uppercase; font-style: italic;
    padding: 12px 20px 14px;
    transform: skewX(-6deg);
    box-shadow: 6px 6px 0 #0c0c0c, 8px 8px 0 var(--cyan);
    border: 3px solid #0c0c0c;
  }
  .logo > * { transform: skewX(6deg); display: inline-block; }
  .logo span { color: #0c0c0c; -webkit-text-stroke: 0; }
  .logo small {
    display: block; font-size: .7rem; font-weight: 800; color: #0c0c0c;
    letter-spacing: 4px; font-style: normal; margin-top: 4px;
    background: #0c0c0c; color: var(--lime); padding: 3px 8px; width: fit-content;
    transform: skewX(6deg);
  }

  /* ---------- Filtros ---------- */
  .filters {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: var(--card); border: 2px solid #0c0c0c;
    border-left: 6px solid var(--lime);
    border-radius: 4px; padding: 12px 14px; margin-bottom: 14px;
    box-shadow: 4px 4px 0 rgba(0,0,0,.5);
  }
  .filters input, .filters select {
    background: #0c0c0c; border: 2px solid var(--line); color: var(--text);
    padding: 8px 12px; border-radius: 3px; font-size: .9rem; outline: none;
    font-weight: 600;
  }
  .filters input { flex: 1; min-width: 160px; }
  .filters input:focus, .filters select:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(56,240,224,.3); }
  .count { color: var(--lime); font-size: .8rem; white-space: nowrap; font-weight: 800; font-style: italic; }

  /* ---------- Selector de personaje ---------- */
  .chars { display: none; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; max-height: 48vh; overflow-y: auto; padding: 4px; scrollbar-width: thin; scrollbar-color: var(--lime) #141414; }
  .chars.open { display: flex; }
  .char-chip {
    background: var(--card); border: 2px solid var(--line); color: var(--text);
    padding: 7px 14px; border-radius: 3px; cursor: pointer;
    font-weight: 800; font-size: .88rem; transition: all .12s;
    display: inline-flex; align-items: center; gap: 7px;
    transform: skewX(-6deg);
  }
  .char-chip > * { transform: skewX(6deg); }
  .char-chip:hover { border-color: var(--cyan); color: var(--cyan); }
  .char-chip.active {
    background: var(--lime); color: #0c0c0c; border-color: #0c0c0c;
    box-shadow: 3px 3px 0 #0c0c0c, 4px 4px 0 var(--cyan);
  }
  .char-chip.active .dot { outline: 2px solid rgba(12,12,12,.5); }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .char-chip .rk { font-size: .7rem; opacity: .8; font-weight: 900; font-style: italic; }
  .empty { color: var(--muted); padding: 20px; text-align: center; width: 100%; }

  /* ---------- Hero del personaje ---------- */
  .hero {
    background:
      repeating-linear-gradient(-45deg, rgba(255,230,51,.05) 0 14px, transparent 14px 28px),
      linear-gradient(120deg, var(--card) 55%, var(--card2));
    border: 3px solid #0c0c0c; border-radius: 6px;
    border-top: 6px solid var(--lime);
    padding: 22px 26px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    position: relative; overflow: hidden;
    box-shadow: 6px 6px 0 rgba(0,0,0,.55);
  }
  .hero::after {
    content: attr(data-rank);
    position: absolute; right: 14px; top: -26px;
    font-family: "Arial Black", "Impact", system-ui, sans-serif;
    font-size: 7rem; font-weight: 900; font-style: italic;
    color: rgba(255,230,51,.10); pointer-events: none;
  }
  .hero h1 {
    font-family: "Arial Black", "Impact", system-ui, sans-serif;
    font-size: 2.2rem; font-weight: 900; font-style: italic; letter-spacing: .5px;
    text-transform: uppercase; color: var(--text);
    text-shadow: 3px 3px 0 rgba(0,0,0,.6);
  }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    padding: 5px 14px; border-radius: 3px; font-size: .8rem; font-weight: 900;
    text-transform: uppercase; letter-spacing: .5px; font-style: italic;
    transform: skewX(-6deg); border: 2px solid #0c0c0c;
  }
  .badge > * { display: inline-block; transform: skewX(6deg); }
  .b-rank { background: var(--lime); color: #0c0c0c; box-shadow: 2px 2px 0 rgba(0,0,0,.5); }
  .b-attr { color: #0c0c0c; box-shadow: 2px 2px 0 rgba(0,0,0,.5); }
  .b-spec { background: #0c0c0c; border: 2px solid var(--cyan); color: var(--cyan); }
  .b-ver  { background: var(--card2); border: 2px solid var(--line); color: var(--muted); }

  /* ---------- Ficha del personaje ---------- */
  .ficha {
    background: var(--card); border: 2px solid #0c0c0c; border-radius: 6px;
    border-left: 6px solid var(--cyan);
    padding: 16px 20px; margin-top: 14px; display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start;
    box-shadow: 5px 5px 0 rgba(0,0,0,.5);
  }
  .ficha .art {
    width: 140px; height: 180px; border-radius: 4px; flex-shrink: 0; position: relative; overflow: hidden;
    background: var(--bg2); display: flex; align-items: center; justify-content: center; border: 3px solid #0c0c0c;
  }
  .ficha .art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .ficha .art .ph { font-family: "Arial Black","Impact",system-ui,sans-serif; font-size: 3rem; font-weight: 900; font-style: italic; color: var(--fixed); }
  .ficha .fmeta { flex: 1; min-width: 240px; }
  .ficha .fname { font-size: 1.15rem; font-weight: 900; font-style: italic; text-transform: uppercase; }
  .ficha .fname small { display: block; font-size: .78rem; color: var(--muted); font-weight: 600; margin-top: 2px; font-style: normal; text-transform: none; }
  .ficha .frow { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .ficha .fchip { font-size: .76rem; font-weight: 800; padding: 4px 11px; border-radius: 3px; background: #0c0c0c; border: 1px solid var(--line); color: var(--muted); }
  .ficha .fdesc { font-size: .9rem; line-height: 1.6; color: var(--text); }
  .ficha .fdesc.pend { color: var(--muted); font-style: italic; }

  /* ---------- Secciones ---------- */
  h2 {
    font-family: "Arial Black", "Impact", system-ui, sans-serif;
    font-size: 1.15rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--lime); margin: 30px 0 14px; font-style: italic;
    display: flex; align-items: center; gap: 12px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.6);
  }
  h2::before {
    content: ""; width: 14px; height: 20px; background: var(--lime); flex-shrink: 0;
    transform: skewX(-12deg); box-shadow: 3px 0 0 var(--cyan);
  }
  h2::after { content: ""; flex: 1; height: 3px; background: repeating-linear-gradient(90deg, var(--line) 0 8px, transparent 8px 12px); }

  /* ---------- Tabla principal ---------- */
  .table-scroll { overflow-x: auto; border-radius: 6px; border: 3px solid #0c0c0c; box-shadow: 5px 5px 0 rgba(0,0,0,.5); }
  table { width: 100%; border-collapse: collapse; background: var(--card); min-width: 640px; }
  thead th {
    background: var(--lime); color: #0c0c0c; font-size: .75rem; font-weight: 900;
    text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 16px; text-align: left;
    border-bottom: 3px solid #0c0c0c; font-style: italic;
  }
  tbody td { padding: 14px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,230,51,.05); }
  .slot-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 4px;
    font-family: "Arial Black","Impact",system-ui,sans-serif;
    font-weight: 900; font-size: 1.15rem; font-style: italic;
  }
  .slot-fixed  { background: #0c0c0c; color: var(--fixed); border: 2px dashed var(--fixed); }
  .slot-choice { background: var(--lime); color: #0c0c0c; border: 2px solid #0c0c0c; box-shadow: 2px 2px 0 var(--cyan); }
  .main-stat { font-weight: 900; font-size: 1.02rem; }
  .main-stat.dim { color: var(--fixed); font-weight: 600; }
  .alt { display: block; font-size: .8rem; color: var(--muted); font-weight: 500; margin-top: 3px; }
  .tag {
    display: inline-block; padding: 3px 10px; margin: 2px 3px 2px 0;
    border-radius: 3px; font-size: .78rem; font-weight: 800;
  }
  .t-crit { background: rgba(255,201,77,.16); color: var(--crit); border: 1px solid rgba(255,201,77,.5); }
  .t-atk  { background: rgba(255,230,51,.14); color: var(--lime); border: 1px solid rgba(255,230,51,.45); }
  .t-pen  { background: rgba(255,122,26,.14); color: var(--orange); border: 1px solid rgba(255,122,26,.5); }
  .t-anom { background: rgba(199,125,255,.14); color: var(--anom); border: 1px solid rgba(199,125,255,.5); }
  .t-imp  { background: rgba(56,240,224,.14); color: var(--imp); border: 1px solid rgba(56,240,224,.5); }
  .t-def  { background: rgba(79,227,193,.14); color: var(--def); border: 1px solid rgba(79,227,193,.5); }
  .t-gen  { background: rgba(242,242,242,.08); color: var(--text); border: 1px solid var(--line); }
  .pick { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; font-style: italic; }
  .pick.yes { color: var(--lime); }
  .disc-badge { display: inline-block; padding: 5px 11px; border-radius: 3px; font-size: .82rem; font-weight: 800; background: rgba(56,240,224,.12); color: var(--cyan); border: 1px solid rgba(56,240,224,.5); white-space: nowrap; }

  /* ---------- Cards inferiores ---------- */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 16px; }
  .card {
    background: var(--card); border: 2px solid #0c0c0c;
    border-top: 5px solid var(--lime);
    border-radius: 5px; padding: 18px 20px;
    box-shadow: 5px 5px 0 rgba(0,0,0,.5);
  }
  .card h3 {
    font-size: .82rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--lime); margin-bottom: 12px; font-weight: 900; font-style: italic;
  }
  .card ol, .card ul { list-style: none; }
  .card li {
    padding: 8px 0; border-bottom: 1px dashed var(--line);
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    font-size: .93rem;
  }
  .card li:last-child { border-bottom: none; }
  .card li b { font-weight: 800; }
  .best { color: var(--lime); }
  .en { color: var(--muted); font-size: .78rem; font-style: italic; text-align: right; white-space: nowrap; }
  .note {
    margin-top: 18px; background: rgba(255,230,51,.07);
    border: 2px solid #0c0c0c; border-left: 6px solid var(--lime); border-radius: 4px;
    padding: 14px 18px; font-size: .92rem; line-height: 1.5;
    box-shadow: 4px 4px 0 rgba(0,0,0,.5);
  }
  .note b { color: var(--lime); }
  footer { margin-top: 34px; text-align: center; color: var(--fixed); font-size: .78rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
</style>

<script>
// ---------- Colores por atributo ----------
const ATTR_COLORS = {
  "Físico":       "#f5e6c8",
  "Ígneo":        "#ff6a3c",
  "Eléctrico":    "#66b8ff",
  "Glacial":      "#8fe3ff",
  "Gélido":       "#b9f4ff",
  "Etéreo":       "#ff8ad8",
  "Tinta áurica": "#ffd75e",
  "Filo":         "#e8f5c8",
  "Aéreo":        "#57e6a2",
};
const attrColor = a => ATTR_COLORS[a] || "#cccccc";

// ---------- Clase de color para cada estadística ----------
function statClass(s) {
  const t = s.toLowerCase();
  if (t.includes("crít") || t.includes("crit")) return "t-crit";
  if (t.includes("anomal") || t.includes("dominio")) return "t-anom";
  if (t.includes("impacto")) return "t-imp";
  if (t.includes("pen") || t.includes("perforación")) return "t-pen";
  if (t.includes("pv") || t.includes("def") || t.includes("escudo") || t.includes("regeneración") || t.includes("energía")) return "t-def";
  if (t.includes("atq") || t.includes("ataque")) return "t-atk";
  return "t-gen";
}

// ---------- Estado de filtros ----------
let activeId = null;

function fillFilterOptions() {
  const attrs = [...new Set(CHARACTERS.map(c => c.atributo))].sort();
  const specs = [...new Set(CHARACTERS.map(c => c.especialidad))].sort();
  document.getElementById("fAttr").innerHTML =
    '<option value="">Atributo: todos</option>' + attrs.map(a => `<option>${a}</option>`).join("");
  document.getElementById("fSpec").innerHTML =
    '<option value="">Especialidad: todas</option>' + specs.map(s => `<option>${s}</option>`).join("");
}

function filtered() {
  const q = document.getElementById("fSearch").value.trim().toLowerCase();
  const r = document.getElementById("fRango").value;
  const a = document.getElementById("fAttr").value;
  const s = document.getElementById("fSpec").value;
  return CHARACTERS.filter(c =>
    (!q || c.nombre.toLowerCase().includes(q)) &&
    (!r || c.rango === r) &&
    (!a || c.atributo === a) &&
    (!s || c.especialidad === s)
  );
}

function applyFilters() {
  const list = filtered();
  document.getElementById("fCount").textContent = `${list.length} agente${list.length !== 1 ? "s" : ""}`;
  const nav = document.getElementById("charNav");
  if (!list.length) {
    nav.innerHTML = `<div class="empty">Sin resultados con esos filtros.</div>`;
    return;
  }
  if (!list.some(c => c.id === activeId)) show(list[0].id, list);
  else renderNav(list);
}

function renderNav(list) {
  document.getElementById("charNav").innerHTML = list.map(c => `
    <button class="char-chip ${c.id === activeId ? "active" : ""}" onclick="show('${c.id}')">
      <span class="dot" style="background:${attrColor(c.atributo)}"></span>
      ${c.nombre} <span class="rk">${c.rango}</span>
    </button>`).join("");
}

// ---------- Render del detalle ----------
function show(id, list) {
  const c = CHARACTERS.find(x => x.id === id);
  if (!c) return;
  activeId = id;
  renderNav(list || filtered());

  const ROMAN = ["I", "II", "III", "IV", "V", "VI"];
  const fixedSubs = c.substats.map(s => `<span class="tag ${statClass(s)}">${s}</span>`).join("");
  // ---- Disco recomendado por ranura: I-IV = set de 4 piezas, V-VI = set de 2 piezas ----
  const discos = c.discos || [];
  const fourPc = discos.find(d => /×4/.test(d.es || "")) || discos.find(d => d.best) || discos[0] || {};
  const twoPc = discos.find(d => /×2/.test(d.es || "")) || {};
  const discCell = d => (d && d.es) ? `<span class="disc-badge">💿 ${d.es}</span>` : `<span class="alt">—</span>`;

  const fixedRows = [["PV (fija)"], ["ATQ plano (fija)"], ["DEF (fija)"]].map((p, i) => `
    <tr>
      <td><span class="slot-num slot-fixed">${ROMAN[i]}</span></td>
      <td><span class="main-stat dim">${p[0]}</span>
          <span class="alt">No se elige: solo importan las subestadísticas.</span></td>
      <td><span class="pick">Fija</span></td>
      <td>${discCell(fourPc)}</td>
      <td>${fixedSubs}</td>
    </tr>`).join("");

  const choiceRows = [c.ranura4, c.ranura5, c.ranura6].map((r, i) => `
    <tr>
      <td><span class="slot-num slot-choice">${ROMAN[i + 3]}</span></td>
      <td><span class="main-stat">${r.principal}</span>
          ${r.alt ? `<span class="alt">${r.alt}</span>` : ""}</td>
      <td><span class="pick yes">★ Se elige</span></td>
      <td>${discCell(i === 0 ? fourPc : twoPc)}</td>
      <td>${fixedSubs}</td>
    </tr>`).join("");

  const lista = arr => (arr || []).map(i => `
    <li>
      <span><b class="${i.best ? "best" : ""}">${i.best ? "★ " : ""}${i.es || i.nombre}</b>
      ${i.nota ? `<span class="alt">${i.nota}</span>` : ""}
      ${i.agentes ? `<span class="alt">${i.agentes}</span>` : ""}</span>
      ${i.en ? `<span class="en">${i.en}</span>` : ""}
    </li>`).join("");

  const f = (typeof FICHAS !== "undefined" && FICHAS[c.id]) || c.ficha || {};
  const artInner = f.img
    ? `<img src="${f.img}" alt="${c.nombre}" loading="lazy" onerror="this.remove()"><span class="ph">${c.nombre[0]}</span>`
    : `<span class="ph">${c.nombre[0]}</span>`;
  const fichaHtml = `
    <div class="ficha">
      <div class="art" style="background:linear-gradient(160deg, ${attrColor(c.atributo)}33, var(--bg2))">${artInner}</div>
      <div class="fmeta">
        <div class="fname">${f.nombreCompleto || c.nombre}${f.nombreCompleto && f.nombreCompleto !== c.nombre ? `<small>En el juego: ${c.nombre}</small>` : ""}</div>
        <div class="frow">
          <span class="fchip" style="border-color:${attrColor(c.atributo)};color:${attrColor(c.atributo)}">${c.atributo}</span>
          <span class="fchip">${c.especialidad}</span>
          <span class="fchip">Rango ${c.rango}</span>
          ${f.faccion ? `<span class="fchip">🏳️ ${f.faccion}</span>` : ""}
          ${f.rol ? `<span class="fchip">${f.rol}</span>` : ""}
        </div>
        <div class="fdesc ${f.desc ? "" : "pend"}">${f.desc || "Ficha del personaje en preparación…"}</div>
      </div>
    </div>`;

  document.getElementById("content").innerHTML = `
    <div class="hero" data-rank="${c.rango}">
      <h1>${c.nombre}</h1>
      <div class="badges">
        <span class="badge b-rank">Rango ${c.rango}</span>
        <span class="badge b-attr" style="background:${attrColor(c.atributo)}">${c.atributo}</span>
        <span class="badge b-spec">${c.especialidad}</span>
        <span class="badge b-ver">v${c.version}</span>
      </div>
    </div>

    ${fichaHtml}

    <h2>Particiones I – VI · qué buscar</h2>
    <div class="table-scroll">
      <table>
        <thead>
          <tr><th>Ranura</th><th>Estadística principal</th><th>Principal</th><th>Disco (set)</th><th>Subestadísticas (en orden de prioridad)</th></tr>
        </thead>
        <tbody>${fixedRows}${choiceRows}</tbody>
      </table>
    </div>

    ${c.consejo ? `<div class="note">💡 ${c.consejo}</div>` : ""}

    <h2>Equipamiento y equipos</h2>
    <div class="grid">
      <div class="card"><h3>⚙️ Motor W (mejor → alternativas)</h3><ol>${lista(c.motoresW)}</ol></div>
      <div class="card"><h3>💿 Sets de discos</h3><ol>${lista(c.discos)}</ol></div>
      <div class="card"><h3>👥 Equipos recomendados</h3><ol>${lista(c.equipos)}</ol></div>
    </div>
  `;
}

// ---------- Mostrar/ocultar la lista de agentes según el buscador ----------
function setupChipsToggle() {
  const searchEl = document.getElementById("fSearch");
  const navEl = document.getElementById("charNav");
  let pinned = false;
  const setOpen = o => navEl.classList.toggle("open", o);
  searchEl.addEventListener("focus", () => setOpen(true));
  searchEl.addEventListener("blur", () => { if (!pinned) setOpen(false); });
  navEl.addEventListener("mouseenter", () => pinned = true);
  navEl.addEventListener("mouseleave", () => { pinned = false; if (document.activeElement !== searchEl) setOpen(false); });
  // al elegir un agente, cierra la lista y quita el foco
  navEl.addEventListener("click", e => { if (e.target.closest(".char-chip")) { pinned = false; searchEl.blur(); setOpen(false); } });
}

// ---------- Init ----------
CHARACTERS.sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
fillFilterOptions();
applyFilters();
setupChipsToggle();
</script>
</body>
</html>
