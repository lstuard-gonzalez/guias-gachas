<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WuWa · Guía rápida de builds</title>
<style>
  :root {
    --bg: #0a0d0e; --bg2: #0f1314; --card: #12181a; --card2: #161e20;
    --teal: #4fd6c9; --teal2: #6fe3d0; --gold: #d9c58a; --crit: #f0b64a; --hp: #7fd8b0; --def: #8fd2f0;
    --energy: #b9b0e6; --elem: #6fe3d0; --heal: #86e2a6;
    --text: #e8eef0; --muted: #7f8f95; --line: rgba(180,210,214,.10); --line2: rgba(180,210,214,.06); --fixed: #4d5b60;
    --mono: "Consolas", "SF Mono", ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 1100px 480px at 84% -16%, rgba(79,214,201,.06), transparent 70%),
      radial-gradient(ellipse 760px 400px at 4% 116%, rgba(79,214,201,.03), transparent 70%),
      repeating-linear-gradient(0deg, rgba(180,210,214,.018) 0 1px, transparent 1px 92px);
    background-attachment: fixed;
    color: var(--text); font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh; padding: 24px 16px 60px;
  }
  .wrap { max-width: 1060px; margin: 0 auto; }
  header { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--line); position: relative; }
  header::after { content: ""; position: absolute; left: 0; bottom: -1px; width: 68px; height: 2px; background: linear-gradient(90deg, var(--teal), transparent); }
  .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; font-style: normal; }
  .logo span { color: var(--teal); font-weight: 300; letter-spacing: 6px; }
  .logo small { display: block; font-family: var(--mono); font-size: .66rem; font-weight: 500; color: var(--muted); letter-spacing: 4px; font-style: normal; margin-top: 8px; }

  .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: var(--card); border: 1px solid var(--line); border-radius: 4px; padding: 12px 14px; margin-bottom: 14px; }
  .filters input, .filters select { background: var(--bg2); border: 1px solid var(--line); color: var(--text); padding: 8px 12px; border-radius: 3px; font-size: .9rem; outline: none; transition: border-color .18s; }
  .filters input { flex: 1; min-width: 160px; }
  .filters input:focus, .filters select:focus { border-color: var(--teal); box-shadow: 0 0 0 1px rgba(79,214,201,.25); }
  .count { color: var(--muted); font-family: var(--mono); font-size: .74rem; letter-spacing: .5px; white-space: nowrap; }

  .chars { display: none; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; max-height: 48vh; overflow-y: auto; padding: 4px; scrollbar-width: thin; scrollbar-color: var(--teal) transparent; }
  .chars.open { display: flex; }
  .char-chip { background: var(--card); border: 1px solid var(--line); color: var(--text); padding: 7px 14px; border-radius: 3px; cursor: pointer; font-weight: 600; font-size: .86rem; letter-spacing: .3px; transition: all .15s; display: inline-flex; align-items: center; gap: 7px; }
  .char-chip:hover { border-color: rgba(79,214,201,.5); background: var(--card2); }
  .char-chip.active { background: rgba(79,214,201,.12); color: var(--teal2); border-color: var(--teal); box-shadow: 0 0 0 1px rgba(79,214,201,.4), 0 0 20px rgba(79,214,201,.12); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .char-chip .rk { font-family: var(--mono); font-size: .68rem; opacity: .6; font-weight: 600; }
  .empty { color: var(--muted); padding: 20px; text-align: center; width: 100%; font-family: var(--mono); letter-spacing: .5px; }

  .hero { background: linear-gradient(120deg, var(--card) 55%, var(--card2)); border: 1px solid var(--line); border-radius: 4px; padding: 24px 28px; margin-bottom: 8px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; position: relative; overflow: hidden; }
  .hero::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--teal), transparent); }
  .hero::after { content: attr(data-rank); position: absolute; right: 22px; top: -12px; font-family: var(--mono); font-size: 5.5rem; font-weight: 700; font-style: normal; color: rgba(79,214,201,.05); letter-spacing: -2px; pointer-events: none; }
  .hero h1 { font-size: 2rem; font-weight: 600; font-style: normal; letter-spacing: 2px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { padding: 5px 13px; border-radius: 3px; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
  .b-rank { background: transparent; border: 1px solid rgba(217,197,138,.5); color: var(--gold); font-family: var(--mono); }
  .b-elem { color: #06110f; font-weight: 700; }
  .b-arma { background: transparent; border: 1px solid var(--teal); color: var(--teal); }
  .b-ver  { background: transparent; border: 1px solid var(--line); color: var(--muted); font-family: var(--mono); letter-spacing: 1px; }

  .ficha { background: var(--card); border: 1px solid var(--line); border-radius: 4px; padding: 16px 20px; margin-top: 14px; display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .ficha .art { width: 140px; height: 180px; border-radius: 3px; flex-shrink: 0; position: relative; overflow: hidden; background: var(--bg2); display: flex; align-items: center; justify-content: center; border: 1px solid var(--line); }
  .ficha .art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .ficha .art .ph { font-size: 3rem; font-weight: 700; font-style: normal; color: var(--fixed); font-family: var(--mono); }
  .ficha .fmeta { flex: 1; min-width: 240px; }
  .ficha .fname { font-size: 1.1rem; font-weight: 600; letter-spacing: .6px; }
  .ficha .fname small { display: block; font-family: var(--mono); font-size: .74rem; color: var(--muted); font-weight: 500; margin-top: 3px; letter-spacing: .3px; }
  .ficha .frow { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .ficha .fchip { font-size: .74rem; font-weight: 600; padding: 4px 11px; border-radius: 3px; background: var(--bg2); border: 1px solid var(--line); color: var(--muted); letter-spacing: .5px; }
  .ficha .fdesc { font-size: .9rem; line-height: 1.65; color: var(--text); }
  .ficha .fdesc.pend { color: var(--muted); font-style: italic; }

  h2 { font-size: .92rem; text-transform: uppercase; letter-spacing: 3px; color: var(--teal); margin: 28px 0 12px; font-style: normal; font-weight: 500; display: flex; align-items: center; gap: 12px; }
  h2::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }

  .table-scroll { overflow-x: auto; border-radius: 4px; border: 1px solid var(--line); }
  table { width: 100%; border-collapse: collapse; background: var(--card); min-width: 640px; }
  thead th { background: var(--bg2); color: var(--muted); font-family: var(--mono); font-size: .68rem; text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--teal); }
  tbody td { padding: 13px 16px; border-bottom: 1px solid var(--line2); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(79,214,201,.03); }
  .slot-num { display: inline-flex; align-items: center; justify-content: center; min-width: 78px; height: 34px; padding: 0 12px; border-radius: 3px; font-family: var(--mono); font-weight: 600; font-size: .76rem; letter-spacing: .5px; background: rgba(79,214,201,.14); color: var(--teal2); border: 1px solid rgba(79,214,201,.45); }
  .slot-num.c3 { background: rgba(79,214,201,.07); color: var(--teal); border: 1px solid rgba(79,214,201,.28); box-shadow: none; }
  .slot-num.c1 { background: var(--bg2); color: var(--muted); border: 1px solid var(--line); box-shadow: none; }
  .main-stat { font-weight: 600; font-size: 1rem; letter-spacing: .3px; }
  .alt { display: block; font-size: .8rem; color: var(--muted); font-weight: 400; margin-top: 3px; }
  .tag { display: inline-block; padding: 3px 10px; margin: 2px 3px 2px 0; border-radius: 3px; font-size: .76rem; font-weight: 600; letter-spacing: .3px; }
  .t-crit { background: rgba(240,182,74,.10); color: var(--crit); border: 1px solid rgba(240,182,74,.35); }
  .t-atk  { background: rgba(217,197,138,.09); color: var(--gold); border: 1px solid rgba(217,197,138,.3); }
  .t-hp   { background: rgba(127,216,176,.09); color: var(--hp); border: 1px solid rgba(127,216,176,.35); }
  .t-def  { background: rgba(143,210,240,.09); color: var(--def); border: 1px solid rgba(143,210,240,.35); }
  .t-energy{ background: rgba(185,176,230,.10); color: var(--energy); border: 1px solid rgba(185,176,230,.35); }
  .t-elem { background: rgba(111,227,208,.09); color: var(--elem); border: 1px solid rgba(111,227,208,.35); }
  .t-heal { background: rgba(134,226,166,.09); color: var(--heal); border: 1px solid rgba(134,226,166,.35); }
  .t-gen  { background: rgba(232,238,240,.05); color: var(--text); border: 1px solid var(--line); }
  .disc-badge { display: inline-block; padding: 5px 11px; border-radius: 3px; font-size: .8rem; font-weight: 600; background: rgba(217,197,138,.08); color: var(--gold); border: 1px solid rgba(217,197,138,.32); white-space: nowrap; }
  .eco-p { display: block; font-size: .76rem; color: var(--muted); margin-top: 4px; }
  .eco-p b { color: var(--teal); font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 4px; padding: 18px 20px; transition: border-color .18s; }
  .card:hover { border-color: rgba(79,214,201,.3); }
  .card h3 { font-family: var(--mono); font-size: .74rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--line2); }
  .card ol, .card ul { list-style: none; }
  .card li { padding: 8px 0; border-bottom: 1px dashed var(--line2); display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: .93rem; }
  .card li:last-child { border-bottom: none; }
  .card li b { font-weight: 600; }
  .best { color: var(--teal2); }
  .en { color: var(--fixed); font-family: var(--mono); font-size: .74rem; font-style: normal; text-align: right; white-space: nowrap; }
  .note { margin-top: 18px; background: rgba(79,214,201,.05); border: 1px solid rgba(79,214,201,.22); border-left: 2px solid var(--teal); border-radius: 3px; padding: 14px 18px; font-size: .92rem; line-height: 1.6; }
  .note b { color: var(--teal); font-weight: 600; }
  .parcial { display: inline-block; margin-left: 8px; font-family: var(--mono); font-size: .66rem; font-weight: 600; color: var(--crit); border: 1px solid rgba(240,182,74,.5); border-radius: 3px; padding: 2px 8px; text-transform: uppercase; letter-spacing: .5px; vertical-align: middle; }
  footer { margin-top: 34px; padding-top: 18px; border-top: 1px solid var(--line); text-align: center; color: var(--fixed); font-family: var(--mono); font-size: .72rem; letter-spacing: 1px; }
</style>
<style>
.site-nav{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:9px 12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.13);border-radius:12px;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;backdrop-filter:blur(4px);}
.site-nav a{text-decoration:none;color:#d3dae8;font-weight:700;font-size:.82rem;padding:5px 11px;border-radius:8px;transition:background .15s,color .15s;white-space:nowrap;}
.site-nav a:hover{background:rgba(255,255,255,.11);color:#fff;}
.site-nav .nav-home{color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);}
.site-nav .nav-sep{width:1px;height:20px;background:rgba(255,255,255,.16);flex:0 0 auto;}
.site-nav .nav-games{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.site-nav .current{background:rgba(255,255,255,.15);color:#fff;pointer-events:none;}
@media(max-width:560px){.site-nav .nav-lbl{display:none;}}
</style>
</head>
<body>
<div class="wrap">
<nav class="site-nav">
  <a class="nav-home" href="../">◄ <span class="nav-lbl">Portal</span></a>
  <span class="nav-sep"></span>
  <div class="nav-games"><a href="../genshin/">Genshin</a><a href="../hsr/">HSR</a><a href="../zzz/">ZZZ</a><a href="../wuwa/" class="current">WuWa</a><a href="../nte/">NTE</a></div>
</nav>

  <header>
    <div class="logo">WUWA <span>Guía</span><small>WUTHERING WAVES · SOLARIS-3 · BUILDS DE RESONADORES</small></div>
  </header>

  <div class="filters">
    <input type="text" id="fSearch" placeholder="🔍 Buscar / ver Resonadores (toca aquí)..." oninput="applyFilters()">
    <select id="fRareza" onchange="applyFilters()"><option value="">Rareza: todas</option><option value="5">5★</option><option value="4">4★</option></select>
    <select id="fElem" onchange="applyFilters()"><option value="">Elemento: todos</option></select>
    <select id="fArma" onchange="applyFilters()"><option value="">Arma: todas</option></select>
    <span class="count" id="fCount"></span>
  </div>

  <nav class="chars" id="charNav"></nav>
  <div id="content"></div>

  <footer>// CONSULTA LOCAL · WUTHERING WAVES · NOMBRES EN ESPAÑOL DEL JUEGO</footer>
</div>

<script src="data.js"></script>
<script>
const ELEM_COLORS = {
  "Glacio": "#8fe3ff", "Fusión": "#ff6a3c", "Electro": "#c77dff",
  "Aéreo": "#57e6a2", "Espectro": "#ffd75e", "Estrago": "#c46aff",
};
const elemColor = e => ELEM_COLORS[e] || "#cccccc";

function statClass(s) {
  const t = s.toLowerCase();
  if (t.includes("crít") || t.includes("crit")) return "t-crit";
  if (t.includes("curaci") || t.includes("sanaci")) return "t-heal";
  if (t.includes("energ")) return "t-energy";
  if (t.includes("bonif") || t.includes("daño de") || t.includes("dano de")) return "t-elem";
  if (t.includes("pv") || t.includes("vida")) return "t-hp";
  if (t.includes("def")) return "t-def";
  if (t.includes("atq") || t.includes("ataque")) return "t-atk";
  return "t-gen";
}

let activeId = null;
function fillFilterOptions() {
  const el = [...new Set(CHARACTERS.map(c => c.elemento))].sort();
  const ar = [...new Set(CHARACTERS.map(c => c.arma))].sort();
  document.getElementById("fElem").innerHTML = '<option value="">Elemento: todos</option>' + el.map(e => `<option>${e}</option>`).join("");
  document.getElementById("fArma").innerHTML = '<option value="">Arma: todas</option>' + ar.map(a => `<option>${a}</option>`).join("");
}
function filtered() {
  const q = document.getElementById("fSearch").value.trim().toLowerCase();
  const r = document.getElementById("fRareza").value, e = document.getElementById("fElem").value, a = document.getElementById("fArma").value;
  return CHARACTERS.filter(c => (!q || c.nombre.toLowerCase().includes(q)) && (!r || String(c.rareza) === r) && (!e || c.elemento === e) && (!a || c.arma === a));
}
function applyFilters() {
  const list = filtered();
  document.getElementById("fCount").textContent = `${list.length} Resonador${list.length !== 1 ? "es" : ""}`;
  const nav = document.getElementById("charNav");
  if (!list.length) { nav.innerHTML = `<div class="empty">Sin resultados.</div>`; document.getElementById("content").innerHTML = ""; return; }
  if (!list.some(c => c.id === activeId)) show(list[0].id, list); else renderNav(list);
}
function renderNav(list) {
  document.getElementById("charNav").innerHTML = list.map(c => `
    <button class="char-chip ${c.id === activeId ? "active" : ""}" onclick="show('${c.id}')">
      <span class="dot" style="background:${elemColor(c.elemento)}"></span>${c.nombre} <span class="rk">${c.rareza}★</span>
    </button>`).join("");
}

function show(id, list) {
  const c = CHARACTERS.find(x => x.id === id);
  if (!c) return;
  activeId = id; renderNav(list || filtered());

  const subs = (c.substats || []).map(s => `<span class="tag ${statClass(s)}">${s}</span>`).join("");
  const ecos = c.ecos || [];
  const sonata = ecos.find(e => e.best) || ecos[0] || {};
  const setCell = `<span class="disc-badge">🎵 ${sonata.es || "—"}</span>`;
  const c4 = c.costo4 || {}, c3 = c.costo3 || {}, c1 = c.costo1 || {};
  const rows = [
    { lbl: "Costo 4", cls: "", r: c4, eco: true },
    { lbl: "Costo 3", cls: "c3", r: c3 },
    { lbl: "Costo 3", cls: "c3", r: c3 },
    { lbl: "Costo 1", cls: "c1", r: c1 },
    { lbl: "Costo 1", cls: "c1", r: c1 },
  ].map(row => `
    <tr>
      <td><span class="slot-num ${row.cls}">${row.lbl}</span></td>
      <td><span class="main-stat">${row.r.principal || "—"}</span>
        ${row.r.alt ? `<span class="alt">${row.r.alt}</span>` : ""}
        ${row.eco && c.ecoPrincipal ? `<span class="eco-p"><b>Eco principal:</b> ${c.ecoPrincipal}</span>` : ""}</td>
      <td>${setCell}</td>
      <td>${subs}</td>
    </tr>`).join("");

  const lista = arr => (arr || []).map((i, idx) => {
    const best = i.best || idx === 0;
    return `<li><span><b class="${best ? "best" : ""}">${best ? "★ " : ""}${i.es || i.nombre}</b>
      ${i.nota ? `<span class="alt">${i.nota}</span>` : ""}${i.agentes ? `<span class="alt">${i.agentes}</span>` : ""}</span>
      ${i.en && i.en !== (i.es || "") ? `<span class="en">${i.en}</span>` : ""}</li>`;
  }).join("");

  const f = c.ficha || {};
  const artInner = f.img ? `<img src="${f.img}" alt="${c.nombre}" loading="lazy" onerror="this.remove()"><span class="ph">${c.nombre[0]}</span>` : `<span class="ph">${c.nombre[0]}</span>`;
  const fichaHtml = `
    <div class="ficha">
      <div class="art" style="background:linear-gradient(160deg, ${elemColor(c.elemento)}33, var(--bg2))">${artInner}</div>
      <div class="fmeta">
        <div class="fname">${f.nombreCompleto || c.nombre}${f.nombreCompleto && f.nombreCompleto !== c.nombre ? `<small>En el juego: ${c.nombre}</small>` : ""}</div>
        <div class="frow">
          <span class="fchip" style="border-color:${elemColor(c.elemento)};color:${elemColor(c.elemento)}">${c.elemento}</span>
          <span class="fchip">${c.arma}</span>
          <span class="fchip">${c.rareza}★</span>
          ${f.faccion ? `<span class="fchip">🏳️ ${f.faccion}</span>` : ""}
        </div>
        <div class="fdesc ${f.desc ? "" : "pend"}">${f.desc || "Ficha del personaje en preparación…"}</div>
      </div>
    </div>`;

  document.getElementById("content").innerHTML = `
    <div class="hero" data-rank="${c.rareza}★">
      <h1>${c.nombre}${c.estado === 'parcial' ? '<span class="parcial">datos parciales</span>' : ''}</h1>
      <div class="badges">
        <span class="badge b-rank">${c.rareza}★</span>
        <span class="badge b-elem" style="background:${elemColor(c.elemento)}">${c.elemento}</span>
        <span class="badge b-arma">${c.arma}</span>
        <span class="badge b-ver">v${c.version}</span>
      </div>
    </div>
    ${fichaHtml}

    <h2>Ecos · estadística principal y set (Sonata)</h2>
    <div class="table-scroll"><table>
      <thead><tr><th>Eco</th><th>Estadística principal</th><th>Set (Sonata)</th><th>Subestadísticas (prioridad)</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>

    ${c.consejo ? `<div class="note">💡 ${c.consejo}</div>` : ""}

    <h2>Equipamiento y equipos</h2>
    <div class="grid">
      <div class="card"><h3>⚔️ Arma (mejor → alternativas)</h3><ol>${lista(c.armas)}</ol></div>
      <div class="card"><h3>🎵 Ecos · set Sonata</h3><ol>${lista(c.ecos)}</ol></div>
      <div class="card"><h3>👥 Equipos recomendados</h3><ol>${lista(c.equipos)}</ol></div>
    </div>
  `;
}

function setupChipsToggle() {
  const searchEl = document.getElementById("fSearch"), navEl = document.getElementById("charNav");
  let pinned = false;
  const setOpen = o => navEl.classList.toggle("open", o);
  searchEl.addEventListener("focus", () => setOpen(true));
  searchEl.addEventListener("blur", () => { if (!pinned) setOpen(false); });
  navEl.addEventListener("mouseenter", () => pinned = true);
  navEl.addEventListener("mouseleave", () => { pinned = false; if (document.activeElement !== searchEl) setOpen(false); });
  navEl.addEventListener("click", e => { if (e.target.closest(".char-chip")) { pinned = false; searchEl.blur(); setOpen(false); } });
}

CHARACTERS.sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
fillFilterOptions();
applyFilters();
setupChipsToggle();
</script>
</body>
</html>
